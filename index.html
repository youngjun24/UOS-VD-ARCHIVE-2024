<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sketchbook Style Page</title>
<link rel="stylesheet" href="styles.css">
<!-- turn.js를 CDN으로 가져오기 (또는 직접 다운로드한 후 경로 변경 가능) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/4/turn.min.js"></script>
</head>
<style>
    /* 전체 페이지 설정 */
    body, html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background-color: #f7f3e9; /* 종이 색상 배경 */
        display: flex;
        justify-content: center;
        align-items: center;
    }

    /* 스케치북 전체 설정 */
    .sketchbook {
    width: 120vw;
    height: 100vh;
    border: 1px solid #d3cdb8;
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    position: relative;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    background-color: #ffffff;
    transition: transform 0.6s ease; /* 페이지 넘김 애니메이션 */
}

.sketchbook.turning {
    transform: rotateX(-180deg); /* 페이지 넘김 효과 */
}

    /* 스케치북 고정 링 */
    .rings {
        display: flex;
        justify-content: space-around;
        position: absolute;
        top: -10px;
        width: 100%;
        z-index: 1;
    }

    .ring {
        width: 20px;
        height: 20px;
        background-color: #bfb8a6;
        border-radius: 50%;
    }
    
    /* 예시로 중앙에 위치한 컨텐츠 */
    .content {
        position: relative; /* 아이콘들이 이 안에서 절대 위치를 잡도록 함 */
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 2em;
        color: #333;
    }

    .icon {
    width: 200px;
    height: 200px;
    position: absolute;
    transition: transform 0.3s ease;
    cursor: pointer;
}

.icon:hover {
    transform: scale(1.5); /* 살짝 커지기 */
}

/* 각 아이콘 위치 설정 */
.icon1 { top: 20%; left: 30%; }
.icon2 { top: 50%; left: 50%; }
.icon3 { top: 70%; left: 70%; }

.title {
        font-family: 'Noto Sans', sans-serif;
        font-size: 1em; /* 글자 크기 조정 */
        font-weight: 500;
        color: #000000;
        position: absolute;
        top: 5%;
        left: 2%;
    }

/* 고정된 로고 이미지 */
.logo {
        position: absolute;
        width: 200px;
        height: auto;
    }
</style>
</head>
<body>
    <!-- 스케치북 전체 틀 -->
    <div class="sketchbook">
        <!-- 고정 링들 -->
        <div class="rings">
            <div class="ring"></div>
            <div class="ring"></div>
            <div class="ring"></div>
            <div class="ring"></div>
            <div class="ring"></div>
            <div class="ring"></div>
            <div class="ring"></div>
            <div class="ring"></div>
            <div class="ring"></div>
            <div class="ring"></div>

        </div>

        <!-- 타이틀 텍스트 -->
        <div class="title">2024 서울시립대학교<br>시각디자인1,2과제전시회</div>
        
        <!-- 고정된 로고 이미지 -->
        <img src="logo.png" alt="Logo" class="logo">

        <!-- 블랙 이미지 아이콘들 -->
        <div class="content">
            <img src="icon1.png" alt="Icon 1" class="icon icon1" onclick="turnPage('page1.html')">
            <img src="icon2.png" alt="Icon 2" class="icon icon2" onclick="turnPage('page2.html')">
            <img src="icon3.png" alt="Icon 3" class="icon icon3" onclick="turnPage('page3.html')">
        </div>
        
    </div>
    <script>
        function turnPage(url) {
            // 페이지 넘김 효과를 위해 turn.js의 페이지 넘김 애니메이션 설정
            const sketchbook = document.querySelector('.sketchbook');
            sketchbook.classList.add('turning'); // 애니메이션 효과를 위한 클래스 추가

            setTimeout(() => {
                window.location.href = url; // 애니메이션이 끝난 후 페이지 이동
            }, 600); // 0.6초 후 페이지 이동
        }
    </script>
</body>
</html>
